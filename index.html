<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teesi & Henri</title>
  <meta name="description" content="Teesi ja Henri pulmaleht" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f3ee;
      --paper: #fffdfb;
      --text: #4b4641;
      --muted: #8f9498;
      --accent: #aebbc6;
      --accent-deep: #92a4b2;
      --line: rgba(146, 164, 178, 0.26);
      --soft-blue: rgba(174, 187, 198, 0.14);
      --shadow: 0 20px 40px rgba(78, 69, 61, 0.07);
      --radius: 26px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: 'Inter', Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.9), transparent 28%),
        linear-gradient(180deg, #f8f4ef 0%, #f5f0ea 100%);
      line-height: 1.7;
    }

    a { color: inherit; }

    .container {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(12px);
      background: rgba(247, 243, 238, 0.86);
      border-bottom: 1px solid rgba(146, 164, 178, 0.16);
    }

    .topbar-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 0;
    }

    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.9rem;
      letter-spacing: 0.05em;
      color: var(--accent-deep);
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-size: 0.95rem;
    }

    .nav a {
      text-decoration: none;
      color: var(--muted);
      transition: 0.2s ease;
    }

    .nav a:hover { color: var(--accent-deep); }

    .hero {
      padding: 88px 0 48px;
    }

    .hero-card {
      background: linear-gradient(180deg, rgba(255,253,251,0.95), rgba(255,250,246,0.92));
      border: 1px solid rgba(174, 187, 198, 0.24);
      border-radius: 34px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .hero-card::after {
      content: '';
      position: absolute;
      inset: auto 0 0 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(174, 187, 198, 0.55), transparent);
    }

    .hero-inner {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 34px;
      padding: 64px 56px;
      align-items: center;
    }

    .eyebrow {
      font-family: 'Cormorant Garamond', serif;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 0.9rem;
      color: var(--accent-deep);
      margin-bottom: 14px;
    }

    h1, h2, h3 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      line-height: 1.08;
      margin: 0 0 14px;
    }

    h1 {
      font-size: clamp(3.5rem, 7vw, 6.2rem);
      letter-spacing: 0.05em;
      color: var(--accent-deep);
      text-transform: uppercase;
    }

    h2 {
      font-size: clamp(2.1rem, 4vw, 3rem);
      color: #697a87;
      letter-spacing: 0.03em;
    }

    h3 {
      font-size: 1.8rem;
      color: #718391;
    }

    .hero p {
      max-width: 720px;
      color: #6d6965;
      font-size: 1.02rem;
      margin: 0 0 24px;
    }

    .hero-details {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .pill {
      padding: 11px 16px;
      border-radius: 999px;
      background: rgba(174, 187, 198, 0.12);
      border: 1px solid rgba(174, 187, 198, 0.22);
      color: #667987;
      font-size: 0.94rem;
    }

    .hero-side {
      background: linear-gradient(180deg, rgba(174, 187, 198, 0.13), rgba(255,255,255,0.55));
      border: 1px solid rgba(174, 187, 198, 0.2);
      border-radius: 28px;
      padding: 28px;
    }

    .hero-side p {
      margin-bottom: 0;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.96rem;
      transition: 0.2s ease;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: var(--accent-deep);
      color: white;
    }

    .btn-primary:hover { filter: brightness(0.96); }

    .btn-secondary {
      background: rgba(255,255,255,0.82);
      border-color: rgba(174, 187, 198, 0.35);
      color: #647785;
    }

    .btn-secondary:hover {
      background: white;
      border-color: rgba(146, 164, 178, 0.52);
    }

    main section { padding: 20px 0; }

    .section-card {
      background: rgba(255,253,251,0.88);
      border-radius: var(--radius);
      padding: 36px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(174, 187, 198, 0.18);
    }

    .section-head {
      margin-bottom: 24px;
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
    }

    .grid {
      display: grid;
      gap: 20px;
    }

    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .info-box, .timeline-item, .stay-card, .faq-item {
      background: linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,255,255,0.62));
      border: 1px solid rgba(174, 187, 198, 0.2);
      border-radius: 22px;
      padding: 24px;
    }

    .label {
      display: inline-block;
      margin-bottom: 10px;
      font-size: 0.78rem;
